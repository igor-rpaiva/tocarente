<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TôCarente</title>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#111; color:white; text-align:center; }
.container { padding:10px; }
video { width:45%; border-radius:10px; margin:5px; }
button { padding:10px; margin:5px; border:none; border-radius:10px; cursor:pointer; }
</style>
</head>

<body>
<div class="container">

<h2>TôCarente 😭 (Vídeo)</h2>

<button onclick="start()">Entrar</button>
<button onclick="next()">Próximo</button>

<div>
  <video id="localVideo" autoplay muted></video>
  <video id="remoteVideo" autoplay></video>
</div>

</div>

<script>
const socket = io();
let localStream;
let peer;

async function start(){
  localStream = await navigator.mediaDevices.getUserMedia({ video:true, audio:true });
  document.getElementById('localVideo').srcObject = localStream;

  socket.emit('find');
}

socket.on('chatStart', async ()=>{
  createPeer(true);
});

socket.on('signal', data=>{
  peer.signal(data);
});

function createPeer(initiator){
  peer = new SimplePeer({ initiator, trickle:false, stream:localStream });

  peer.on('signal', data=>{
    socket.emit('signal', data);
  });

  peer.on('stream', stream=>{
    document.getElementById('remoteVideo').srcObject = stream;
  });
}

function next(){
  socket.emit('next');
  location.reload();
}
</script>

<!-- SimplePeer CDN -->
<script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>

</body>
</html>
