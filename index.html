<!DOCTYPE html>
<html>
<head>
<title>TôCarente</title>
<style>
body { text-align:center; font-family:Arial; }
.logo img { width:250px; margin-top:40px; }
</style>
</head>
<body>

<div class="logo">
  <img src="logo.png">
</div>

<h3>+18 obrigatório</h3>
<input type="checkbox" id="age"> Tenho mais de 18 anos

<h3>Login</h3>
<input id="email" placeholder="email"><br><br>
<input id="senha" placeholder="senha"><br><br>

<button onclick="login()">Entrar</button>
<button onclick="register()">Cadastrar</button>

<script>
async function login(){
  if(!age.checked) return alert('Confirme +18');

  const res = await fetch('/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      email: email.value,
      senha: senha.value
    })
  });

  const user = await res.json();
  localStorage.setItem('userId', user._id);

  window.location = '/chat.html';
}

async function register(){
  await fetch('/register',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      email: email.value,
      senha: senha.value
    })
  });

  alert('Conta criada');
}
</script>

</body>
</html>
